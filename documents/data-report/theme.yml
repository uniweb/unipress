# Theme — "Institute" (academic-metrics default)
#
# Clean, institutional palette suited to administrative reporting:
# near-white page, slate body text, Inter throughout for a legible,
# spreadsheet-adjacent feel. Semantic tokens drive every surface so a
# site author overrides colors and fonts once and the whole report —
# preview AND downloaded xlsx typography, once the style pack reads
# these vars at compile time — tracks the change.
#
# Tenant-level tuning:
#   - `colors.primary` sets the link/button hue (currently blue).
#   - `colors.accent` drives totals rows, chart highlights, emphasis.
#   - `fonts.heading` / `fonts.body` flow through to Excel's font table
#     (pending the xlsx style-pack pass planned in slice 9).

# ─── Colors ────────────────────────────────────────────────────────────────
colors:
  primary: '#1e40af'     # Institutional blue — primary actions, links
  secondary: '#475569'   # Slate — secondary surfaces, table borders
  accent: '#be123c'      # Rose — totals rows, emphasis
  neutral: slate

# ─── Page background ────────────────────────────────────────────────────────
background: '#fafbfc'

# ─── Fonts ──────────────────────────────────────────────────────────────────
fonts:
  heading: "'Inter', ui-sans-serif, system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif"
  body: "'Inter', ui-sans-serif, system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif"
  mono: "'JetBrains Mono', ui-monospace, SFMono-Regular, Menlo, monospace"
  import:
    - url: https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap
    - url: https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500&display=swap

# ─── Context overrides ──────────────────────────────────────────────────────
contexts:
  light:
    section: '#fafbfc'
    card: '#ffffff'
    heading: '#0f172a'
    body: '#334155'
    subtle: '#64748b'
    border: '#e2e8f0'
    muted: '#f1f5f9'
  medium:
    section: '#f1f5f9'
    card: '#ffffff'
    heading: '#0f172a'
    body: '#334155'
    subtle: '#64748b'
    border: '#cbd5e1'
    muted: '#e2e8f0'
  dark:
    section: '#0f172a'
    card: '#1e293b'
    heading: '#f8fafc'
    body: '#e2e8f0'
    subtle: '#94a3b8'
    border: '#334155'
    muted: '#1e293b'

# ─── Inline styles ──────────────────────────────────────────────────────────
inline:
  accent:
    color: 'var(--accent)'
    font-weight: '600'
  subtle:
    color: 'var(--subtle)'
    font-style: italic
