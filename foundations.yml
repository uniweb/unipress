# unipress foundation catalog
#
# Each entry is a Press-based foundation unipress knows how to drive. Users
# pick one at `unipress create` time; the chosen entry determines both the
# document.yml's foundation: value AND which templates/<scaffold>/ tree gets
# copied.
#
# ─────────────────────────────────────────────────────────────────────────
# Foundation resolution
# ─────────────────────────────────────────────────────────────────────────
#
# A catalog-id in document.yml's `foundation:` resolves like this:
#
#   document.yml foundation: academic-metrics
#       ↓
#   catalog lookup (this file) → source.url
#       ↓
#   download + cache at ~/.cache/unipress/foundations/<id>@<version>/foundation.js
#       ↓
#   foundation-loader imports the cached path
#
# A URL in `foundation:` works the same way (cache keyed by the URL).
#
# ─────────────────────────────────────────────────────────────────────────
# URL format
# ─────────────────────────────────────────────────────────────────────────
#
# The v0.1 entries point at `http://localhost:4001/foundations/<name>@<version>/foundation.js`
# — the local unicloud foundation registry (platform/unicloud). To test end-
# to-end you must:
#
#   1. Build the foundation               pnpm --filter <foundation> build
#   2. Publish to the local registry      cd <foundation> && uniweb publish --local
#   3. Run unicloud                       cd platform/unicloud && pnpm dev
#   4. Scaffold + compile                 unipress create my-doc && unipress compile my-doc
#
# Public-CDN URLs for these catalog entries will come once a public-facing
# registry exists and the foundations are published there. Users who want to
# skip unicloud today can pass --foundation <path-or-url> explicitly, which
# bypasses the catalog resolver.

foundations:
  - id: academic-metrics
    name: Academic Metrics Report
    description: >
      Faculty metrics across a set of members — publications, supervisions,
      funding. Emits both a downloadable Excel workbook and a Word report.
    outputs: [xlsx, docx]
    source:
      # Localhost unicloud URL (see setup above). Replace with a public URL
      # once the foundation ships to a public registry.
      url: http://localhost:4001/foundations/academic-metrics@0.1.0/foundation.js
    scaffold: academic-metrics
